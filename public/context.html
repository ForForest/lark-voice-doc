<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Beeni · 背景资料</title>
<style>
  :root{
    --bg:#f5f3ee; --card:#fffdf8; --ink:#2b2a26; --muted:#7c776c; --line:#e7e2d6;
    --sage:#5f7a5c; --sage-soft:#e8f0e5; --amber:#c8821f; --amber-soft:#fbf1de; --bad:#c0492f;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.6 -apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;}
  .wrap{max-width:680px;margin:0 auto;padding:34px 20px 60px}
  h1{font-size:24px;margin:0 0 4px}
  header p{margin:0;color:var(--muted);font-size:13.5px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:18px}
  .card h2{font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  label{display:block;font-size:13px;font-weight:600;margin:0 0 5px}
  input.label{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;margin-bottom:10px}
  textarea{width:100%;min-height:130px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;
    font-size:13.5px;resize:vertical;font-family:ui-monospace,Menlo,monospace;line-height:1.5}
  input:focus,textarea:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-soft)}
  button{font-size:13.5px;font-weight:600;border-radius:10px;cursor:pointer;border:1px solid var(--line);
    background:#fff;color:var(--ink);padding:9px 16px}
  button.primary{background:var(--sage);color:#fff;border:0}
  button:hover{filter:brightness(1.03)}
  .row{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
  .drop{margin-top:4px;border:2px dashed var(--line);border-radius:12px;padding:26px;text-align:center;
    color:var(--muted);font-size:13.5px;cursor:pointer;transition:.15s}
  .drop.over{border-color:var(--sage);background:var(--sage-soft);color:var(--sage)}
  .drop b{color:var(--ink)}
  .types{font-size:12px;color:var(--muted);margin-top:6px}
  .items{margin-top:6px;display:flex;flex-direction:column;gap:8px}
  .item{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:11px;padding:10px 12px}
  .item .ic{width:30px;height:30px;border-radius:8px;background:var(--sage-soft);color:var(--sage);
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:14px}
  .item .meta{flex:1;min-width:0}
  .item .nm{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .sz{font-size:12px;color:var(--muted)}
  .item .rm{border:0;background:transparent;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px}
  .item .rm:hover{color:var(--bad)}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:14px}
  .topbar{display:flex;align-items:center;gap:10px;margin-top:18px}
  .count{font-size:13px;color:var(--muted);margin-left:auto}
  .toast{font-size:12.5px;color:var(--muted);margin-left:8px}
  .toast.bad{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📎 背景资料</h1>
    <p>把别处的内容喂给 Beeni——粘贴跟其他 AI 的对话、或上传文档。讨论时它会带着这些上下文。内容只存在本地。</p>
  </header>

  <!-- paste -->
  <section class="card">
    <h2>✍️ 粘贴文本</h2>
    <input class="label" id="pasteLabel" placeholder="给它起个名（可选，比如「跟 ChatGPT 聊的方案」）" />
    <textarea id="pasteText" placeholder="把对话或笔记粘到这里…"></textarea>
    <div class="row">
      <button class="primary" onclick="addPaste()">添加为背景</button>
      <span id="pasteToast" class="toast"></span>
    </div>
  </section>

  <!-- upload -->
  <section class="card">
    <h2>📄 上传文档</h2>
    <div class="drop" id="drop" onclick="document.getElementById('file').click()">
      拖文件到这里，或<b>点击选择</b>
      <div class="types">支持 .txt · .md · .pdf · .docx</div>
    </div>
    <input type="file" id="file" accept=".txt,.md,.markdown,.pdf,.docx,.log,.csv,.json" multiple hidden />
    <span id="upToast" class="toast"></span>
  </section>

  <!-- loaded -->
  <div class="topbar">
    <h2 style="margin:0;font-size:15px">已加载的背景</h2>
    <span class="count" id="count"></span>
    <button onclick="clearAll()" style="font-size:12px;padding:6px 12px">全部清空</button>
  </div>
  <div class="items" id="items"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const ICON = { paste:'✍️', file:'📄' };
async function loadList(){
  const { items } = await (await fetch('/api/context/list')).json();
  const box = $('items'); box.innerHTML='';
  $('count').textContent = items.length ? `${items.length} 项 · 共 ${items.reduce((a,b)=>a+b.chars,0).toLocaleString()} 字` : '';
  if(!items.length){ box.innerHTML='<div class="empty">还没有背景资料。粘贴或上传点东西吧。</div>'; return; }
  for(const it of items){
    const el=document.createElement('div'); el.className='item';
    el.innerHTML=`<div class="ic">${ICON[it.source]||'📄'}</div>
      <div class="meta"><div class="nm"></div><div class="sz">${it.chars.toLocaleString()} 字</div></div>
      <button class="rm" title="移除">×</button>`;
    el.querySelector('.nm').textContent = it.label;
    el.querySelector('.rm').onclick = () => remove(it.id);
    box.appendChild(el);
  }
}
async function addPaste(){
  const text=$('pasteText').value, label=$('pasteLabel').value;
  const t=$('pasteToast');
  if(!text.trim()){ t.textContent='先粘点东西'; t.className='toast bad'; return; }
  t.textContent='添加中…'; t.className='toast';
  try{
    const r=await (await fetch('/api/context/add',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({label,text,source:'paste'})})).json();
    if(r.ok){ $('pasteText').value=''; $('pasteLabel').value=''; t.textContent='✓ 已添加'; t.className='toast'; loadList(); }
    else { t.textContent='✗ '+(r.error||'失败'); t.className='toast bad'; }
  }catch(e){ t.textContent='✗ '+e.message; t.className='toast bad'; }
}
async function uploadFiles(files){
  const t=$('upToast');
  for(const f of files){
    t.textContent=`解析 ${f.name} …`; t.className='toast';
    try{
      const ex=await (await fetch('/api/context/extract?filename='+encodeURIComponent(f.name),
        {method:'POST',headers:{'content-type':'application/octet-stream'},body:f})).json();
      if(!ex.ok){ t.textContent='✗ '+f.name+'：'+(ex.error||'解析失败'); t.className='toast bad'; continue; }
      if(!ex.text || !ex.text.trim()){ t.textContent='✗ '+f.name+'：没抽到文字（可能是扫描件/图片 PDF）'; t.className='toast bad'; continue; }
      const ad=await (await fetch('/api/context/add',{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({label:f.name,text:ex.text,source:'file'})})).json();
      if(ad.ok){ t.textContent=`✓ ${f.name}（${ex.chars.toLocaleString()} 字）`; t.className='toast'; loadList(); }
    }catch(e){ t.textContent='✗ '+f.name+'：'+e.message; t.className='toast bad'; }
  }
}
async function remove(id){ await fetch('/api/context/remove',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id})}); loadList(); }
async function clearAll(){ if(!confirm('清空全部背景资料？')) return; await fetch('/api/context/clear',{method:'POST'}); loadList(); }

// dropzone
const drop=$('drop');
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('over');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('over');}));
drop.addEventListener('drop',e=>{ if(e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files); });
$('file').addEventListener('change',e=>{ if(e.target.files.length) uploadFiles(e.target.files); e.target.value=''; });

loadList();
</script>
</body>
</html>
